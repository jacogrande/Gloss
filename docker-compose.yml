services:
  postgres:
    image: postgres:16-alpine
    container_name: gloss-postgres
    environment:
      POSTGRES_DB: gloss
      POSTGRES_USER: gloss
      POSTGRES_PASSWORD: gloss
    ports:
      - "54329:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U gloss -d gloss
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - gloss_postgres_data:/var/lib/postgresql/data

volumes:
  gloss_postgres_data:
