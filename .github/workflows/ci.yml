name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ENRICHMENT_PROVIDER_MODE: live
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MERRIAM_WEBSTER_DICTIONARY_API_KEY: ${{ secrets.MERRIAM_WEBSTER_DICTIONARY_API_KEY }}
      MERRIAM_WEBSTER_THESAURUS_API_KEY: ${{ secrets.MERRIAM_WEBSTER_THESAURUS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.42

      - name: Install PostgreSQL binaries
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Prepare local env
        run: cp .env.example .env

      - name: Verify live provider env
        run: |
          test -n "$OPENAI_API_KEY"
          test -n "$MERRIAM_WEBSTER_DICTIONARY_API_KEY"
          test -n "$MERRIAM_WEBSTER_THESAURUS_API_KEY"

      - name: Harness checks
        run: bun run harness:check

      - name: Boundary checks
        run: bun run lint:boundaries

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Smoke
        run: bun run smoke

      - name: Eval
        run: bun run eval
